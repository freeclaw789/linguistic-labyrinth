<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linguistic Labyrinth: Rush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="stats">
            <span>Level: <span id="level-val">1</span></span>
            <span>Score: <span id="score-val">0</span></span>
        </div>
        <div id="target-container">
            Find a synonym for:<br>
            <strong id="target-word">...</strong>
        </div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">Linguistic Labyrinth</h1>
        <p id="overlay-desc">Collect the synonyms. Avoid the noise.</p>
        <button id="start-btn">Start Run</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
